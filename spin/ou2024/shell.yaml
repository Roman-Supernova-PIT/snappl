---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shell
  namespace: romansnpit-ou2024
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      workload.user.cattle.io/workloadselector: deployment-romansnpit-ou2024-shell
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
    type: RollingUpdate
  template:
    metadata:
      annotations:
        nersc.gov/collab_uids: "101320"
        nersc.gov/gid: "101320"
        nersc.gov/gids: 101320,96414
        nersc.gov/roles: user
        nersc.gov/uid: "95089"
        nersc.gov/username: raknop
      labels:
        workload.user.cattle.io/workloadselector: deployment-romansnpit-ou2024-shell
    spec:
      affinity: {}
      containers:
      - name: shell
        image: registry.nersc.gov/m4385/snpit-db-webserver:ou2024-2060701
        imagePullPolicy: Always
        resources: {}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            add:
            - NET_BIND_SERVICE
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 95089
        stdin: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        tty: true
        command: [ 'tail', '-f', '/etc/issue' ]
        volumeMounts:
        - mountPath: /secrets
          name: secrets
        - mountPath: /home
          name: m4385-rknop
        # ...can't mount scratch in spin
        # - mountPath: /data
        #   name: ou2024-data
        # - mountPath: /snpit_temp
        #   name: rknop-snpit-temp
        # - mountPath: /masao-snpit
        #   name: masao-snpit
        - mountPath: /ou2024
          name: ou2024
        - mountPath: /ou2024snana
          name: ou2024snana
      dnsPolicy: ClusterFirst
      imagePullSecrets:
        - name: registry-nersc
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext:
        runAsUser: 95089
        fsGroup: 101320
      terminationGracePeriodSeconds: 30
      volumes:
      - name: secrets
        secret:
          defaultMode: 292
          optional: false
          secretName: secrets
      - name: m4385-rknop
        hostPath:
          path: /global/cfs/cdirs/m4385/users/rknop
          type: Directory
      # can't mount scratch in spin
      # - name: ou2024-data
      #   hostPath:
      #     path: /pscratch/sd/m/masao/roman_snpit/database_dirs_ou2024
      #     type: Directory
      # - name: rknop-snpit-temp
      #   hostPath:
      #     path: /pscratch/sd/r/raknop/snpit_temp
      #     type: Directory
      # - name: masao-snpit
      #   hostPath:
      #     path: /pscratch/sd/m/masao/roman_snpit
      #     type: Directory
      - name: ou2024
        hostPath:
          path: /global/cfs/cdirs/lsst/shared/external/roman-desc-sims/Roman_data
          type: Directory
      - name: ou2024snana
        hostPath:
          path: /global/cfs/cdirs/lsst/www/DESC_TD_PUBLIC/Roman+DESC/PQ+HDF5_ROMAN+LSST_LARGE
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: shell
  namespace: romansnpit-ou2024
spec:
  clusterIP: None
  clusterIPs:
  - None
  ports:
  - name: default
    port: 42
    protocol: TCP
    targetPort: 42
  selector:
    workload.user.cattle.io/workloadselector: deployment-romansnpit-ou2024-shell
  sessionAffinity: None
  type: ClusterIP
status:
  loadBalancer: {}
---
